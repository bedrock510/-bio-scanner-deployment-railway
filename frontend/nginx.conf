server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA routing — all paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security: don't expose nginx version
    server_tokens off;

    # Cache static assets aggressively (Vite hashes filenames on every build)
    location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html so users always get the latest deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
